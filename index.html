<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://i.imgur.com/LNAsG4A.png">
<title>Primeiras Páginas: O Patinho Feio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#e6e1e1;
    min-height:100vh;
}

.tela{
    display:none;
    width:100%;
    min-height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.ativa{
    display:flex;
}

#loading img, #inicio img{
    width:300px;
    max-width:80%;
}

.loading-text{
    margin-top:30px;
    font-size:22px;
}

.botao-iniciar{
    margin-top:40px;
    padding:18px 50px;
    font-size:18px;
    border:2px solid #cf9683;
    background:#80bcb8;
    border-radius:20px;
    cursor:pointer;
}

.livro{
    display:flex;
    align-items:center;
    gap:20px;
    width:100%;
    justify-content:center;
}

.seta{
    width:80px;
    height:80px;
    border:none;
    border-radius:50%;
    background:#95c8c5;
    font-size:40px;
    cursor:pointer;
}

.pagina{
    width:900px;
    max-width:100%;
    min-height:500px;
    background: #f3b925;
    border-radius:30px;
    padding:30px;
    display:flex;
    gap:30px;
    align-items:center;
}

#imagemLivro{
    width:45%;
    max-height:400px;
    object-fit:cover;
    border-radius:20px;
}

.texto{
    width:55%;
}

.texto h1{
    margin-bottom:20px;
    font-size:36px;
}

.texto p{
    font-size:22px;
    line-height:1.6;
}

.numero-pagina{
    margin-top:20px;
}

#fim{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    color:white;
    justify-content:center;
    align-items:center;
    font-size:80px;
    z-index:999;
}

footer{
    bottom:0;
    width:100%;
    text-align:center;
    padding:-5px;
    font-size: 10px;
}

/* Mobile */
@media (max-width:768px){
    .livro{
        flex-direction:column;
    }

    .pagina{
        flex-direction:column;
        min-height:auto;
    }

    #imagemLivro{
        width:100%;
        max-height:250px;
    }

    .texto{
        width:100%;
        text-align:center;
    }

    .texto h1{
        font-size:24px;
    }

    .texto p{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div id="loading" class="tela ativa">
    <img src="https://i.imgur.com/LNAsG4A.png">
    <div class="loading-text">Carregando...</div>
</div>

<div id="inicio" class="tela">
    <img src="https://i.imgur.com/LNAsG4A.png">
    <button class="botao-iniciar" onclick="iniciarLeitura()">Iniciar Leitura</button>
</div>

<div id="livroTela" class="tela">
    <div class="livro">
        <button class="seta" onclick="paginaAnterior()">⬅</button>

        <div class="pagina">
            <img id="imagemLivro">

            <div class="texto">
                <h1 id="titulo"></h1>
                <p id="conteudo"></p>
                <div class="numero-pagina" id="numeroPagina"></div>
            </div>
        </div>

        <button class="seta" onclick="proximaPagina()">➡</button>
    </div>
</div>

<div id="fim">FIM</div>

<footer>
Desenvolvido por Camila Morais, Nicole Aparacida, Gabriel Yukino, David Kaio e Pietro Moura | 3DS 2026 EE. AMÁCIO MAZZAROPI
</footer>

<audio id="quackAudio" src="https://www.soundjay.com/animal/duck-1.mp3"></audio>

<script>
const paginas = [
{
titulo:"O Patinho Feio",
imagem:"https://i.imgur.com/F118fZ1.png",
conteudo:"Era uma manhã de verão..."
},
{
titulo:"Página 2",
imagem:"https://i.imgur.com/BgM7T8S.png",
conteudo:"Finalmente o último ovo se abriu..."
},
{
titulo:"Página 3",
imagem:"https://i.imgur.com/HzbrJrt.png",
conteudo:"Os outros animais começaram a rir..."
},
{
titulo:"Página 4",
imagem:"https://i.imgur.com/YlaD9Aj.png",
conteudo:"Após muitas aventuras, ele descobriu que era um cisne."
}
];

let paginaAtual = 0;
let timerFim = null;

function tocarQuack(){
    const audio = document.getElementById("quackAudio");
    audio.currentTime = 0;
    audio.play();
}

function atualizarPagina(){
    document.getElementById("titulo").textContent = paginas[paginaAtual].titulo;
    document.getElementById("conteudo").textContent = paginas[paginaAtual].conteudo;
    document.getElementById("imagemLivro").src = paginas[paginaAtual].imagem;
    document.getElementById("numeroPagina").textContent = `Página ${paginaAtual+1} de ${paginas.length}`;

    if(paginaAtual === paginas.length - 1){
        timerFim = setTimeout(mostrarFim, 90000);
    } else {
        clearTimeout(timerFim);
    }
}

function proximaPagina(){
    if(paginaAtual < paginas.length - 1){
        paginaAtual++;
        tocarQuack();
        atualizarPagina();
    }
}

function paginaAnterior(){
    if(paginaAtual > 0){
        paginaAtual--;
        tocarQuack();
        atualizarPagina();
    }
}

function iniciarLeitura(){
    document.getElementById("inicio").classList.remove("ativa");
    document.getElementById("livroTela").classList.add("ativa");
    paginaAtual = 0;
    atualizarPagina();
}

function mostrarFim(){
    document.getElementById("fim").style.display = "flex";

    setTimeout(()=>{
        document.getElementById("fim").style.display = "none";
        document.getElementById("livroTela").classList.remove("ativa");
        document.getElementById("inicio").classList.add("ativa");
    }, 3000);
}

setTimeout(()=>{
    document.getElementById("loading").classList.remove("ativa");
    document.getElementById("inicio").classList.add("ativa");
}, 5000);
</script>

</body>
</html>
